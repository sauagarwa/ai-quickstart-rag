llm-service:
  device: cpu

global:
  models:
    llama-3-2-3b-instruct-cpu:
      id: meta-llama/Llama-3.2-3B-Instruct
      enabled: true
      resources:
        limits:
          cpu: "6"
          memory: 48Gi
        requests:
          cpu: "2"
          memory: 24Gi
      args:
        - --enable-auto-tool-choice
        - --chat-template
        - /chat-templates/tool_chat_template_llama3.2_json.jinja
        - --tool-call-parser
        - llama3_json
        - --dtype
        - auto
        - --max-model-len
        - "16384"
        - --max-num-seqs
        - "1"
