llm-service:
  device: cpu

global:
  models:
    llama-3-2-3b-instruct-cpu:
      id: meta-llama/Llama-3.2-3B-Instruct
      enabled: true
      resources:
        limits:
          cpu: "4"
          memory: 32Gi
        requests:
          cpu: "1"
          memory: 16Gi
      args:
        - --enable-auto-tool-choice
        - --chat-template
        - /chat-templates/tool_chat_template_llama3.2_json.jinja
        - --tool-call-parser
        - llama3_json
        - --max-model-len
        - "8192"
        - --max-num-seqs
        - "2"
